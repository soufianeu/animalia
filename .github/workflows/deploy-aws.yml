name: Deploy to AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  SAM_STACK_NAME: ${{ vars.SAM_STACK_NAME || 'animalia-orders-api' }}
  S3_BUCKET: ${{ vars.S3_BUCKET }}
  ALLOWED_ORIGIN: ${{ vars.ALLOWED_ORIGIN }}
  CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required repository config
        env:
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          set -euo pipefail
          missing=0

          for var_name in S3_BUCKET ALLOWED_ORIGIN AWS_ROLE_TO_ASSUME ADMIN_TOKEN; do
            if [ -z "${!var_name:-}" ]; then
              echo "::error::Missing required repository variable/secret: ${var_name}"
              missing=1
            fi
          done

          if [ "$missing" -eq 1 ]; then
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-session-name: animalia-github-actions

      - name: Setup SAM
        uses: aws-actions/setup-sam@v2

      - name: Build and deploy backend (SAM)
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          set -euo pipefail

          sam build --template-file aws/template.yaml

          sam deploy \
            --stack-name "$SAM_STACK_NAME" \
            --region "$AWS_REGION" \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --resolve-s3 \
            --parameter-overrides \
              AllowedOrigin="$ALLOWED_ORIGIN" \
              AdminToken="$ADMIN_TOKEN"

      - name: Read API URL output
        id: api
        run: |
          set -euo pipefail
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name "$SAM_STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text)

          if [ -z "$API_URL" ] || [ "$API_URL" = "None" ]; then
            echo "::error::ApiUrl output not found in stack outputs."
            exit 1
          fi

          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"

      - name: Generate runtime config.js
        run: |
          cat > config.js <<EOF
          // Auto-generated by GitHub Actions deploy workflow.
          window.__ANIMALIA_API_URL__ = "${{ steps.api.outputs.api_url }}";
          EOF

      - name: Deploy static site to S3
        run: |
          set -euo pipefail
          aws s3 sync . "s3://$S3_BUCKET" --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude ".aws-sam/*" \
            --exclude "aws/*" \
            --exclude "*.md"

      - name: Invalidate CloudFront cache
        if: ${{ env.CLOUDFRONT_DISTRIBUTION_ID != '' }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --paths "/*"
